<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>BMI Calculator</h1>
        
        <div class="form-group">
            <label for="height">Height (cm):</label>
            <input type="number" id="height" placeholder="Enter height in centimeters" step="0.1">
        </div>
        
        <div class="form-group">
            <label for="weight">Weight (kg):</label>
            <input type="number" id="weight" placeholder="Enter weight in kilograms" step="0.1">
        </div>
        
        <button id="calculate-btn">Calculate BMI</button>
        
        <div id="error-message" class="error-message"></div>
        
        <div id="result" class="result-container" style="display: none;">
            <div class="result-value">
                <p>Your BMI:</p>
                <h2 id="bmi-value"></h2>
            </div>
            <div class="result-category">
                <p>Category:</p>
                <h3 id="bmi-category"></h3>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
